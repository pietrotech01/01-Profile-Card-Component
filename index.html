<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kumbh+Sans:wght,YOPQ@100..900,300&display=swap"
      rel="stylesheet"
    />
    <title>Profile card component by Pietro</title>
  </head>
  <body>
    <div class="root-container">
      <img class="top-bg-image" src="images/bg-pattern-top.svg" />
      <img class="bottom-bg-image" src="images/bg-pattern-bottom.svg" />

      <div class="profile-card">
        <div class="pc-top">
          <img src="./images/bg-pattern-card.svg" alt="pattern" />
        </div>
        <div class="pc-picture">
          <img src="./images/image-victor.jpg" alt="picture of man" />
        </div>
        <div class="pc-bottom">
          <div class="pc-details">
            <p class="name">Victor Crest <span>26</span></p>
            <p class="london">London</p>
          </div>
          <div class="pc-social-media-stats">
            <div class="followers">
              <p class="numbers">80K</p>
              <p class="small-spaced">Followers</p>
            </div>
            <div class="likes">
              <p class="numbers">803K</p>
              <p class="small-spaced">Likes</p>
            </div>
            <div class="photos">
              <p class="numbers">1.4K</p>
              <p class="small-spaced">Photos</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
